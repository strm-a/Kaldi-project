# Datasource
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=kaldi
quarkus.datasource.password=kaldi123
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/kaldi_db

# Hibernate
quarkus.hibernate-orm.log.sql=true
# Dev mode: drop/recreate the schema and load import.sql on every restart.
%dev.quarkus.hibernate-orm.schema-management.strategy=drop-and-create
%dev.quarkus.hibernate-orm.sql-load-script=import.sql
# Prod mode (docker-compose): schema + seed come from postgres/seed.sql on first Postgres boot.
# `validate` just checks the schema matches the entities — it won't drop or wipe data.
%prod.quarkus.hibernate-orm.schema-management.strategy=validate

# Dev Services: postgres dev service is skipped because datasource URL is set above.
# Keycloak dev service auto-starts a Keycloak container in dev mode (requires Docker/Podman).

# Swagger UI
%dev.quarkus.swagger-ui.always-include=true
%prod.quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui

# Port
quarkus.http.port=8080

# Keycloak / OIDC
# In dev mode, Dev Services for Keycloak auto-configures auth-server-url / client-id / client-secret.
# In prod, override via env vars: QUARKUS_OIDC_AUTH_SERVER_URL, QUARKUS_OIDC_CLIENT_ID, QUARKUS_OIDC_CREDENTIALS_SECRET
quarkus.oidc.application-type=service
%dev.quarkus.oidc.tls.verification=none
# Wait up to 30s for Keycloak to become reachable on startup (used by docker-compose boot)
quarkus.oidc.connection-delay=PT30S
# Dev Services for Keycloak puts roles in the `groups` claim (via microprofile-jwt scope).
# If using a real Keycloak that ships roles in realm_access.roles, change this to: realm_access/roles
quarkus.oidc.roles.role-claim-path=groups
# Use `preferred_username` (e.g. "aliceOperator") as the principal name instead of the default `sub` (UUID).
# The acquire endpoint looks up the Operator row via Operator.findByUsername(principal.getName()).
quarkus.oidc.token.principal-claim=preferred_username

# Dev Services for Keycloak — spins up a Keycloak container with a pre-seeded realm, users, and roles
quarkus.keycloak.devservices.realm-name=kaldi
quarkus.keycloak.devservices.create-realm=true
quarkus.keycloak.devservices.users.aliceOperator=alice
quarkus.keycloak.devservices.roles.aliceOperator=operator
quarkus.keycloak.devservices.users.mikeOperator=mike
quarkus.keycloak.devservices.roles.mikeOperator=operator
quarkus.keycloak.devservices.users.lucyOperator=lucy
quarkus.keycloak.devservices.roles.lucyOperator=operator
