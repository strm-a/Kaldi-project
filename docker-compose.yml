services:

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kaldi_db}
      POSTGRES_USER: ${POSTGRES_USER:-kaldi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kaldi123}
    volumes:
      # Postgres runs any *.sql in this dir on first boot (empty data dir).
      - ./postgres/seed.sql:/docker-entrypoint-initdb.d/seed.sql:ro
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kaldi} -d ${POSTGRES_DB:-kaldi_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    restart: unless-stopped
    command:
      - start-dev
      - --import-realm
      - --http-port=8081
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_BOOTSTRAP_ADMIN_USERNAME:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_BOOTSTRAP_ADMIN_PASSWORD:-admin}
    volumes:
      - ./keycloak/kaldi-realm.json:/opt/keycloak/data/import/kaldi-realm.json:ro
    ports:
      - "${KEYCLOAK_HOST_PORT:-8081}:8081"

  kaldi-api:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-kaldi_db}
      QUARKUS_DATASOURCE_USERNAME: ${POSTGRES_USER:-kaldi}
      QUARKUS_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-kaldi123}
      QUARKUS_OIDC_AUTH_SERVER_URL: http://keycloak:8081/realms/${KEYCLOAK_REALM:-kaldi}
      # Bruno/Swagger hit Keycloak at localhost:8081, so tokens carry that issuer.
      # Override so the API accepts them while still fetching JWKS from the internal URL.
      QUARKUS_OIDC_TOKEN_ISSUER: http://localhost:${KEYCLOAK_HOST_PORT:-8081}/realms/${KEYCLOAK_REALM:-kaldi}
      QUARKUS_OIDC_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-quarkus-app}
      QUARKUS_OIDC_CREDENTIALS_SECRET: ${KEYCLOAK_CLIENT_SECRET:-secret}
    ports:
      - "${KALDI_API_HOST_PORT:-8080}:8080"
    restart: on-failure
